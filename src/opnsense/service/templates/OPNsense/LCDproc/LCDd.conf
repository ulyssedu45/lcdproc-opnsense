{#
    LCDd.conf - LCDproc daemon configuration
    Generated by pfSense LCDproc package
    1-for-1 port of pfSense lcdproc.inc sync_package_lcdproc()
#}
{% if helpers.exists('OPNsense.lcdproc.general.enabled') and OPNsense.lcdproc.general.enabled == '1' %}
{% set general = OPNsense.lcdproc.general %}
{% set driver = general.driver %}
{% set comport = general.comport|default('none') %}
{% if comport != 'none' %}

{# comport -> realport (pfSense keys) #}
{% set comport_map = {
    'com1':    '/dev/cua0',
    'com2':    '/dev/cua1',
    'com1a':   '/dev/cuau0',
    'com2a':   '/dev/cuau1',
    'ucom1':   '/dev/cuaU0',
    'ucom2':   '/dev/cuaU1',
    'lpt1':    '/dev/lpt0',
    'ttyU0':   '/dev/ttyU0',
    'ttyU1':   '/dev/ttyU1',
    'ttyU2':   '/dev/ttyU2',
    'ttyU3':   '/dev/ttyU3',
    'ugen0.2': '/dev/ugen0.2',
    'ugen1.2': '/dev/ugen1.2',
    'ugen1.3': '/dev/ugen1.3',
    'ugen2.2': '/dev/ugen2.2'
} %}
{% set realport = comport_map[comport]|default('') %}

{# set_lcd_value(fieldname, max, default_value) — pfSense line 739-759 #}
{# value is raw percent string: "-1", "0", "10"..."100"               #}
{% macro brightness_val(val, max, default_value) %}Brightness={{ (max * val|int / 100)|int if (val is defined and val != '' and val != '-1') else default_value }}
{% endmacro %}
{% macro offbrightness_val(val, max, default_value) %}OffBrightness={{ (max * val|int / 100)|int if (val is defined and val != '' and val != '-1') else default_value }}
{% endmacro %}
{% macro contrast_val(val, max, default_value) %}Contrast={{ (max * val|int / 100)|int if (val is defined and val != '' and val != '-1') else default_value }}
{% endmacro %}

[server]
DriverPath=/usr/local/lib/lcdproc/
Driver={{ driver }}
Bind=127.0.0.1
Port=13666
{% set log_level = general.log_level|default('2') %}
{% if log_level|int < 0 %}
ReportToSyslog=no
{% else %}
ReportLevel={{ log_level }}
ReportToSyslog=yes
{% endif %}
User=nobody
Foreground=no
ServerScreen=no
GoodBye="Thanks for using"
GoodBye="    pfSense     "
WaitTime={{ general.refresh_frequency|default('5') }}
{% set backlight = general.backlight|default('') %}
{% if backlight != '' and backlight != 'default' %}
Backlight={{ backlight }}
{% endif %}
{% if driver == 'sdeclcd' %}
PrevScreenKey=Down
NextScreenKey=Up
[menu]
MenuKey=Left
EnterKey=Right
UpKey=Up
DownKey=Down
{% else %}
ToggleRotateKey=Enter
PrevScreenKey=Left
NextScreenKey=Right
ScrollUpKey=Up
ScrollDownKey=Down
[menu]
MenuKey=Escape
EnterKey=Enter
UpKey=Up
DownKey=Down
{% endif %}
{% if driver == 'bayrad' %}
[bayrad]
Device={{ realport }}
{% endif %}
{% if driver == 'CFontz' %}
[CFontz]
Device={{ realport }}
Size={{ general.size|default('20x4') }}
{{ contrast_val(general.contrast|default('-1'), 1000, 350) -}}
{{ brightness_val(general.brightness|default('-1'), 1000, 1000) -}}
{{ offbrightness_val(general.offbrightness|default('-1'), 1000, 50) -}}
NewFirmware=no
Reboot=no
{% endif %}
{% if driver == 'CFontzPacket' %}
[CFontzPacket]
Device={{ realport }}
Model=635
Size={{ general.size|default('20x4') }}
{{ contrast_val(general.contrast|default('-1'), 1000, 350) -}}
{{ brightness_val(general.brightness|default('-1'), 1000, 1000) -}}
{{ offbrightness_val(general.offbrightness|default('-1'), 1000, 50) -}}
NewFirmware=yes
Reboot=yes
{% endif %}
{% if driver == 'curses' %}
[curses]
Foreground=blue
Background=cyan
Backlight=red
Size={{ general.size|default('20x4') }}
TopLeftX=7
TopLeftY=7
UseACS=no
{% endif %}
{% if driver == 'CwLnx' %}
[CwLnx]
Model=12232
Device={{ realport }}
Size={{ general.size|default('20x4') }}
Reboot=no
{% endif %}
{% if driver == 'ea65' %}
[ea65]
Device={{ realport }}
OffBrightness=0
{{ brightness_val(general.brightness|default('-1'), 1000, 500) -}}
{% endif %}
{% if driver == 'EyeboxOne' %}
[EyeboxOne]
Device={{ realport }}
Backlight=yes
{% endif %}
{% if driver == 'glk' %}
[glk]
Device={{ realport }}
{{ contrast_val(general.contrast|default('-1'), 1000, 350) -}}
{% endif %}
{% if driver == 'hd44780' %}
{% set conn_type = general.connection_type|default('4bit') %}
[hd44780]
driverpath=/usr/local/lib/lcdproc/
ConnectionType={{ conn_type }}
{% if conn_type != 'ezio' %}
Device={{ realport }}
Port=0x378
Speed=0
{{ contrast_val(general.contrast|default('-1'), 1000, 850) -}}
{{ brightness_val(general.brightness|default('-1'), 1000, 800) -}}
{{ offbrightness_val(general.offbrightness|default('-1'), 1000, 0) -}}
Backlight=yes
OutputPort=no
Charmap=hd44780_default
DelayBus=true
Size={{ general.size|default('20x4') }}
{% if conn_type == 'pertelian' %}
DelayMult=32
Keypad=no
{% else %}
DelayMult=1
Keypad=yes
{% endif %}
{% endif %}
{% if conn_type == 'winamp' %}
KeyDirect_1=Enter
KeyDirect_2=Up
KeyDirect_3=Down
KeyDirect_4=Escape
{% endif %}
{% if conn_type == 'ezio' %}
Device={{ realport }}
Charmap=hd44780_default
Size=16x2
Backlight=no
Keypad=yes
KeyMatrix_4_1=Enter
KeyMatrix_4_2=Up
KeyMatrix_4_3=Down
KeyMatrix_4_4=Escape
{% endif %}
{% endif %}
{% if driver == 'icp_a106' %}
[icp_a106]
Device={{ realport }}
{% endif %}
{% if driver == 'IOWarrior' %}
[IOWarrior]
Size={{ general.size|default('20x4') }}
{% endif %}
{% if driver == 'lb216' %}
[lb216]
Device={{ realport }}
{{ brightness_val(general.brightness|default('-1'), 255, 255) -}}
Reboot=no
{% endif %}
{% if driver == 'lcdm001' %}
[lcdm001]
Device={{ realport }}
{% endif %}
{% if driver == 'lcterm' %}
[lcterm]
Device={{ realport }}
Size={{ general.size|default('20x4') }}
{% endif %}
{% if driver == 'MD8800' %}
[MD8800]
Device={{ realport }}
Size={{ general.size|default('20x4') }}
{{ brightness_val(general.brightness|default('-1'), 1000, 1000) -}}
{{ offbrightness_val(general.offbrightness|default('-1'), 1000, 0) -}}
{% endif %}
{% if driver == 'ms6931' %}
[ms6931]
Device={{ realport }}
Reboot=no
{% endif %}
{% if driver == 'mtc_s16209x' %}
[mtc_s16209x]
Device={{ realport }}
{{ brightness_val(general.brightness|default('-1'), 255, 255) -}}
Reboot=no
{% endif %}
{% if driver == 'MtxOrb' %}
[MtxOrb]
Device={{ realport }}
Size={{ general.size|default('20x4') }}
Type={{ general.mtxorb_type|default('lcd') }}
hasAdjustableBacklight={{ 'yes' if general.mtxorb_adjustable_backlight|default('0') == '1' else 'no' }}
Reboot=no
{{ contrast_val(general.contrast|default('-1'), 1000, 480) -}}
{{ brightness_val(general.brightness|default('-1'), 1000, 1000) -}}
{{ offbrightness_val(general.offbrightness|default('-1'), 1000, 0) -}}
{% endif %}
{% if driver == 'nexcom' %}
[nexcom]
driverpath =/usr/local/lib/lcdproc/
Device={{ realport }}
Size={{ general.size|default('20x4') }}
{% endif %}
{% if driver == 'NoritakeVFD' %}
[NoritakeVFD]
Device={{ realport }}
Size={{ general.size|default('20x4') }}
{{ brightness_val(general.brightness|default('-1'), 1000, 1000) -}}
{{ offbrightness_val(general.offbrightness|default('-1'), 1000, 0) -}}
Parity=0
Reboot=no
{% endif %}
{% if driver == 'picolcd' %}
[picolcd]
driverpath=/usr/local/lib/lcdproc/
Device={{ realport }}
Size={{ general.size|default('20x4') }}
KeyTimeout=500
{{ contrast_val(general.contrast|default('-1'), 1000, 1000) -}}
{{ brightness_val(general.brightness|default('-1'), 1000, 1000) -}}
{{ offbrightness_val(general.offbrightness|default('-1'), 1000, 0) -}}
Blacklight_Timer=60
Keylights=on
Key0Light=on
Key1Light=off
Key2Light=off
Key3Light=off
Key4Light=off
Key5Light=off
{% endif %}
{% if driver == 'pyramid' %}
[pyramid]
Device={{ realport }}
Size={{ general.size|default('20x4') }}
{% endif %}
{% if driver == 'rawserial' %}
[rawserial]
Device={{ realport }}
Size={{ general.size|default('20x4') }}
UpdateRate=1
{% endif %}
{% if driver == 'sdeclcd' %}
[sdeclcd]
{% endif %}
{% if driver == 'sed1330' %}
[sed1330]
{% endif %}
{% if driver == 'sed1520' %}
[sed1520]
{% endif %}
{% if driver == 'serialPOS' %}
[serialPOS]
Device={{ realport }}
Size={{ general.size|default('20x4') }}
Type=AEDEX
{% endif %}
{% if driver == 'serialVFD' %}
[serialVFD]
use_parallel=no
Device={{ realport }}
Size={{ general.size|default('20x4') }}
Type=0
{{ brightness_val(general.brightness|default('-1'), 1000, 1000) -}}
{{ offbrightness_val(general.offbrightness|default('-1'), 1000, 0) -}}
ISO_8859_1=yes
{% endif %}
{% if driver == 'shuttleVFD' %}
[shuttleVFD]
{% endif %}
{% if driver == 'SureElec' %}
[SureElec]
driverpath =/usr/local/lib/lcdproc/
Device={{ realport }}
Size={{ general.size|default('20x4') }}
Edition=2
{{ contrast_val(general.contrast|default('-1'), 1000, 200) -}}
{{ brightness_val(general.brightness|default('-1'), 1000, 480) -}}
{% endif %}
{% if driver == 'sli' %}
[sli]
Device={{ realport }}
{% endif %}
{% set port_speed = general.port_speed|default('0') %}
{% if port_speed != '' and port_speed != '0' %}
Speed={{ port_speed }}
{% endif %}
{% endif %}
{% endif %}
