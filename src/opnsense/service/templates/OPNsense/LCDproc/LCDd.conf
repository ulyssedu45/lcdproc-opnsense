{#
    LCDd.conf - LCDproc daemon configuration
    Generated by OPNsense LCDproc plugin
    Ported 1:1 from pfSense LCDproc package (lcdproc.inc)
#}
{% if helpers.exists('OPNsense.lcdproc.general.enabled') and OPNsense.lcdproc.general.enabled == '1' %}
{% set general = OPNsense.lcdproc.general %}
{% set driver = general.driver %}
{% set comport = general.comport|default('none') %}
{% set size = general.size|default('s20x4') %}
{% set loglevel = general.loglevel|default('v2') %}
{% set refresh = general.refresh_frequency|default('r5') %}
{% set port_speed = general.port_speed|default('b0') %}
{% set brightness = general.brightness|default('m1') %}
{% set offbrightness = general.offbrightness|default('m1') %}
{% set contrast = general.contrast|default('m1') %}
{% set backlight = general.backlight|default('default') %}
{% set connection_type = general.connection_type|default('c4bit') %}

{# Map comport option values to device paths #}
{% set comport_map = {
    'none': '',
    'dev_cua0': '/dev/cua0',
    'dev_cua1': '/dev/cua1',
    'dev_cuau0': '/dev/cuau0',
    'dev_cuau1': '/dev/cuau1',
    'dev_cuaU0': '/dev/cuaU0',
    'dev_cuaU1': '/dev/cuaU1',
    'dev_ttyU0': '/dev/ttyU0',
    'dev_ttyU1': '/dev/ttyU1',
    'dev_ttyU2': '/dev/ttyU2',
    'dev_ttyU3': '/dev/ttyU3',
    'dev_ugen0_2': '/dev/ugen0.2',
    'dev_ugen1_2': '/dev/ugen1.2',
    'dev_ugen1_3': '/dev/ugen1.3',
    'dev_ugen2_2': '/dev/ugen2.2',
    'dev_lpt0': '/dev/lpt0'
} %}
{% set device_path = comport_map[comport]|default('') %}

{# Map size option values to actual sizes #}
{% set size_map = {
    's12x1': '12x1', 's12x2': '12x2', 's12x4': '12x4',
    's16x1': '16x1', 's16x2': '16x2', 's16x4': '16x4',
    's20x1': '20x1', 's20x2': '20x2', 's20x4': '20x4',
    's40x2': '40x2'
} %}
{% set display_size = size_map[size]|default(size) %}

{# Map loglevel option values (-1 = disabled) #}
{% set loglevel_map = {
    'm1': '-1', 'v0': '0', 'v1': '1', 'v2': '2', 'v3': '3', 'v4': '4', 'v5': '5'
} %}
{% set log_level = loglevel_map[loglevel]|default('2') %}

{# Map refresh frequency #}
{% set refresh_map = {
    'r1': '1', 'r2': '2', 'r3': '3', 'r5': '5', 'r10': '10', 'r15': '15'
} %}
{% set wait_time = refresh_map[refresh]|default('5') %}

{# Map port speed #}
{% set speed_map = {
    'b0': '0', 'b1200': '1200', 'b2400': '2400', 'b9600': '9600',
    'b19200': '19200', 'b57600': '57600', 'b115200': '115200'
} %}
{% set baud_speed = speed_map[port_speed]|default('0') %}

{# Map brightness/contrast/offbrightness percentages to 0-1000 scale #}
{% set pct_map = {
    'm1': '-1', 'p0': '0', 'p10': '100', 'p20': '200', 'p30': '300',
    'p40': '400', 'p50': '500', 'p60': '600', 'p70': '700',
    'p80': '800', 'p90': '900', 'p100': '1000'
} %}
{% set bright_val = pct_map[brightness]|default('-1') %}
{% set offbright_val = pct_map[offbrightness]|default('-1') %}
{% set contrast_val = pct_map[contrast]|default('-1') %}

{# Map brightness percentages to 0-255 scale (for lb216, mtc_s16209x) #}
{% set pct_map_255 = {
    'm1': '-1', 'p0': '0', 'p10': '25', 'p20': '51', 'p30': '76',
    'p40': '102', 'p50': '127', 'p60': '153', 'p70': '178',
    'p80': '204', 'p90': '229', 'p100': '255'
} %}
{% set bright_val_255 = pct_map_255[brightness]|default('-1') %}

{# Map connection type #}
{% set conntype_map = {
    'c4bit': '4bit', 'c8bit': '8bit', 'winamp': 'winamp',
    'serialLpt': 'serialLpt', 'picanlcd': 'picanlcd',
    'lcdserializer': 'lcdserializer', 'los_panel': 'los-panel',
    'vdr_lcd': 'vdr-lcd', 'vdr_wakeup': 'vdr-wakeup',
    'pertelian': 'pertelian', 'bwctusb': 'bwctusb',
    'lcd2usb': 'lcd2usb', 'usbtiny': 'usbtiny',
    'lis2': 'lis2', 'mplay': 'mplay', 'ftdi': 'ftdi',
    'usblcd': 'usblcd', 'i2c': 'i2c', 'ezio': 'ezio'
} %}
{% set conn_type = conntype_map[connection_type]|default(connection_type) %}

[server]
DriverPath=/usr/local/lib/lcdproc/
Driver={{ driver }}
Bind=127.0.0.1
Port=13666
{% if log_level|int < 0 %}
ReportToSyslog=no
{% else %}
ReportLevel={{ log_level }}
ReportToSyslog=yes
{% endif %}
User=nobody
Foreground=no
ServerScreen=no
Hello="  Welcome to"
Hello="   OPNsense!"
GoodBye="Thanks for using"
GoodBye="   OPNsense!"
WaitTime={{ wait_time }}
{% if backlight != 'default' %}
Backlight={{ backlight }}
{% endif %}
{% if driver == 'sdeclcd' %}
PrevScreenKey=Down
NextScreenKey=Up
{% else %}
ToggleRotateKey=Enter
PrevScreenKey=Left
NextScreenKey=Right
ScrollUpKey=Up
ScrollDownKey=Down
{% endif %}

[menu]
{% if driver == 'sdeclcd' %}
MenuKey=Left
EnterKey=Right
{% else %}
MenuKey=Escape
EnterKey=Enter
{% endif %}
UpKey=Up
DownKey=Down

{# ==================== DRIVER-SPECIFIC SECTIONS ==================== #}

{# --- bayrad --- #}
{% if driver == 'bayrad' %}
[bayrad]
{% if device_path %}
Device={{ device_path }}
{% endif %}
{% endif %}

{# --- CFontz --- #}
{% if driver == 'CFontz' %}
[CFontz]
{% if device_path %}
Device={{ device_path }}
{% endif %}
Size={{ display_size }}
Contrast={{ contrast_val if contrast_val != '-1' else '350' }}
Brightness={{ bright_val if bright_val != '-1' else '1000' }}
OffBrightness={{ offbright_val if offbright_val != '-1' else '50' }}
NewFirmware=no
Reboot=no
{% endif %}

{# --- CFontzPacket --- #}
{% if driver == 'CFontzPacket' %}
[CFontzPacket]
{% if device_path %}
Device={{ device_path }}
{% endif %}
Model=635
Size={{ display_size }}
Contrast={{ contrast_val if contrast_val != '-1' else '350' }}
Brightness={{ bright_val if bright_val != '-1' else '1000' }}
OffBrightness={{ offbright_val if offbright_val != '-1' else '50' }}
NewFirmware=yes
Reboot=yes
{% endif %}

{# --- curses --- #}
{% if driver == 'curses' %}
[curses]
Foreground=blue
Background=cyan
Backlight=red
Size={{ display_size }}
TopLeftX=7
TopLeftY=7
UseACS=no
{% endif %}

{# --- CwLnx --- #}
{% if driver == 'CwLnx' %}
[CwLnx]
Model=12232
{% if device_path %}
Device={{ device_path }}
{% endif %}
Size={{ display_size }}
Reboot=no
{% endif %}

{# --- ea65 --- #}
{% if driver == 'ea65' %}
[ea65]
{% if device_path %}
Device={{ device_path }}
{% endif %}
OffBrightness=0
Brightness={{ bright_val if bright_val != '-1' else '500' }}
{% endif %}

{# --- EyeboxOne --- #}
{% if driver == 'EyeboxOne' %}
[EyeboxOne]
{% if device_path %}
Device={{ device_path }}
{% endif %}
Backlight=yes
{% endif %}

{# --- glcd --- #}
{% if driver == 'glcd' %}
[glcd]
{% if device_path %}
Device={{ device_path }}
{% endif %}
Size={{ display_size }}
{% if contrast_val != '-1' %}
Contrast={{ contrast_val }}
{% endif %}
{% if bright_val != '-1' %}
Brightness={{ bright_val }}
{% endif %}
{% if offbright_val != '-1' %}
OffBrightness={{ offbright_val }}
{% endif %}
{% endif %}

{# --- glk --- #}
{% if driver == 'glk' %}
[glk]
{% if device_path %}
Device={{ device_path }}
{% endif %}
Contrast={{ contrast_val if contrast_val != '-1' else '350' }}
{% endif %}

{# --- hd44780 --- #}
{% if driver == 'hd44780' %}
[hd44780]
driverpath=/usr/local/lib/lcdproc/
ConnectionType={{ conn_type }}
{% if conn_type == 'ezio' %}
{% if device_path %}
Device={{ device_path }}
{% endif %}
Charmap=hd44780_default
Size=16x2
Backlight=no
Keypad=yes
KeyMatrix_4_1=Enter
KeyMatrix_4_2=Up
KeyMatrix_4_3=Down
KeyMatrix_4_4=Escape
{% elif device_path %}
Device={{ device_path }}
Port=0x378
Speed=0
Contrast={{ contrast_val if contrast_val != '-1' else '850' }}
Brightness={{ bright_val if bright_val != '-1' else '800' }}
OffBrightness={{ offbright_val if offbright_val != '-1' else '0' }}
Backlight=yes
OutputPort=no
Charmap=hd44780_default
DelayBus=true
Size={{ display_size }}
{% if conn_type == 'pertelian' %}
DelayMult=32
Keypad=no
{% else %}
DelayMult=1
Keypad=yes
{% endif %}
{% if conn_type == 'winamp' %}
KeyDirect_1=Enter
KeyDirect_2=Up
KeyDirect_3=Down
KeyDirect_4=Escape
{% endif %}
{% endif %}
{% endif %}

{# --- icp_a106 --- #}
{% if driver == 'icp_a106' %}
[icp_a106]
{% if device_path %}
Device={{ device_path }}
{% endif %}
{% endif %}

{# --- IOWarrior --- #}
{% if driver == 'IOWarrior' %}
[IOWarrior]
Size={{ display_size }}
{% endif %}

{# --- lb216 --- #}
{% if driver == 'lb216' %}
[lb216]
{% if device_path %}
Device={{ device_path }}
{% endif %}
Brightness={{ bright_val_255 if bright_val_255 != '-1' else '255' }}
Reboot=no
{% endif %}

{# --- lcdm001 --- #}
{% if driver == 'lcdm001' %}
[lcdm001]
{% if device_path %}
Device={{ device_path }}
{% endif %}
{% endif %}

{# --- lcterm --- #}
{% if driver == 'lcterm' %}
[lcterm]
{% if device_path %}
Device={{ device_path }}
{% endif %}
Size={{ display_size }}
{% endif %}

{# --- MD8800 --- #}
{% if driver == 'MD8800' %}
[MD8800]
{% if device_path %}
Device={{ device_path }}
{% endif %}
Size={{ display_size }}
Brightness={{ bright_val if bright_val != '-1' else '1000' }}
OffBrightness={{ offbright_val if offbright_val != '-1' else '0' }}
{% endif %}

{# --- ms6931 --- #}
{% if driver == 'ms6931' %}
[ms6931]
{% if device_path %}
Device={{ device_path }}
{% endif %}
Reboot=no
{% endif %}

{# --- mtc_s16209x --- #}
{% if driver == 'mtc_s16209x' %}
[mtc_s16209x]
{% if device_path %}
Device={{ device_path }}
{% endif %}
Brightness={{ bright_val_255 if bright_val_255 != '-1' else '255' }}
Reboot=no
{% endif %}

{# --- MtxOrb --- #}
{% if driver == 'MtxOrb' %}
[MtxOrb]
{% if device_path %}
Device={{ device_path }}
{% endif %}
Size={{ display_size }}
Type={{ general.mtxorb_type|default('lcd') }}
hasAdjustableBacklight={{ 'yes' if general.mtxorb_adjustable_backlight|default('0') == '1' else 'no' }}
Reboot=no
Contrast={{ contrast_val if contrast_val != '-1' else '480' }}
Brightness={{ bright_val if bright_val != '-1' else '1000' }}
OffBrightness={{ offbright_val if offbright_val != '-1' else '0' }}
{% endif %}

{# --- NoritakeVFD --- #}
{% if driver == 'NoritakeVFD' %}
[NoritakeVFD]
{% if device_path %}
Device={{ device_path }}
{% endif %}
Size={{ display_size }}
Brightness={{ bright_val if bright_val != '-1' else '1000' }}
OffBrightness={{ offbright_val if offbright_val != '-1' else '0' }}
Parity=0
Reboot=no
{% endif %}

{# --- picolcd --- #}
{% if driver == 'picolcd' %}
[picolcd]
driverpath=/usr/local/lib/lcdproc/
{% if device_path %}
Device={{ device_path }}
{% endif %}
Size={{ display_size }}
KeyTimeout=500
Contrast={{ contrast_val if contrast_val != '-1' else '1000' }}
Brightness={{ bright_val if bright_val != '-1' else '1000' }}
OffBrightness={{ offbright_val if offbright_val != '-1' else '0' }}
Blacklight_Timer=60
Keylights=on
Key0Light=on
Key1Light=off
Key2Light=off
Key3Light=off
Key4Light=off
Key5Light=off
{% endif %}

{# --- pyramid --- #}
{% if driver == 'pyramid' %}
[pyramid]
{% if device_path %}
Device={{ device_path }}
{% endif %}
Size={{ display_size }}
{% endif %}

{# --- rawserial --- #}
{% if driver == 'rawserial' %}
[rawserial]
{% if device_path %}
Device={{ device_path }}
{% endif %}
Size={{ display_size }}
UpdateRate=1
{% endif %}

{# --- sdeclcd --- #}
{% if driver == 'sdeclcd' %}
[sdeclcd]
{% endif %}

{# --- sed1330 --- #}
{% if driver == 'sed1330' %}
[sed1330]
{% endif %}

{# --- sed1520 --- #}
{% if driver == 'sed1520' %}
[sed1520]
{% endif %}

{# --- serialPOS --- #}
{% if driver == 'serialPOS' %}
[serialPOS]
{% if device_path %}
Device={{ device_path }}
{% endif %}
Size={{ display_size }}
Type=AEDEX
{% endif %}

{# --- serialVFD --- #}
{% if driver == 'serialVFD' %}
[serialVFD]
use_parallel=no
{% if device_path %}
Device={{ device_path }}
{% endif %}
Size={{ display_size }}
Type=0
Brightness={{ bright_val if bright_val != '-1' else '1000' }}
OffBrightness={{ offbright_val if offbright_val != '-1' else '0' }}
ISO_8859_1=yes
{% endif %}

{# --- shuttleVFD --- #}
{% if driver == 'shuttleVFD' %}
[shuttleVFD]
{% endif %}

{# --- sli --- #}
{% if driver == 'sli' %}
[sli]
{% if device_path %}
Device={{ device_path }}
{% endif %}
{% endif %}

{# --- stv5730 --- #}
{% if driver == 'stv5730' %}
[stv5730]
Size={{ display_size }}
Port=0x378
{% endif %}

{# --- SureElec --- #}
{% if driver == 'SureElec' %}
[SureElec]
driverpath=/usr/local/lib/lcdproc/
{% if device_path %}
Device={{ device_path }}
{% endif %}
Size={{ display_size }}
Edition=2
Contrast={{ contrast_val if contrast_val != '-1' else '200' }}
Brightness={{ bright_val if bright_val != '-1' else '480' }}
{% endif %}

{# --- t6963 --- #}
{% if driver == 't6963' %}
[t6963]
Size={{ display_size }}
Port=0x378
{% endif %}

{# --- text --- #}
{% if driver == 'text' %}
[text]
Size={{ display_size }}
{% endif %}

{# --- tyan --- #}
{% if driver == 'tyan' %}
[tyan]
{% if device_path %}
Device={{ device_path }}
{% endif %}
Size={{ display_size }}
{% endif %}

{# --- vlsys_m428 --- #}
{% if driver == 'vlsys_m428' %}
[vlsys_m428]
{% if device_path %}
Device={{ device_path }}
{% endif %}
Size={{ display_size }}
{% endif %}

{# Port speed - appended to driver section when non-default (matches pfSense) #}
{% if baud_speed != '0' %}
Speed={{ baud_speed }}
{% endif %}

{% endif %}
