{#
    LCDd.conf - LCDproc daemon configuration
    Generated by OPNsense LCDproc plugin
    Ported from pfSense LCDproc package (lcdproc.inc)
#}
{% if helpers.exists('OPNsense.lcdproc.general.enabled') and OPNsense.lcdproc.general.enabled == '1' %}
{% set general = OPNsense.lcdproc.general %}
{% set driver = general.driver %}
{% set comport = general.comport|default('none') %}
{% set size = general.size|default('20x4') %}
{% set loglevel = general.loglevel|default('2') %}
{% set refresh = general.refresh_frequency|default('5') %}
{% set port_speed = general.port_speed|default('0') %}
{% set brightness = general.brightness|default('m1') %}
{% set offbrightness = general.offbrightness|default('m1') %}
{% set contrast = general.contrast|default('m1') %}
{% set backlight = general.backlight|default('default') %}
{% set connection_type = general.connection_type|default('4bit') %}

{# Map comport option values to device paths #}
{% set comport_map = {
    'none': '',
    '_dev_cua0': '/dev/cua0',
    '_dev_cua1': '/dev/cua1',
    '_dev_cuau0': '/dev/cuau0',
    '_dev_cuau1': '/dev/cuau1',
    '_dev_cuaU0': '/dev/cuaU0',
    '_dev_cuaU1': '/dev/cuaU1',
    '_dev_ttyU0': '/dev/ttyU0',
    '_dev_ttyU1': '/dev/ttyU1',
    '_dev_ttyU2': '/dev/ttyU2',
    '_dev_ttyU3': '/dev/ttyU3',
    '_dev_ugen0.2': '/dev/ugen0.2',
    '_dev_ugen1.2': '/dev/ugen1.2',
    '_dev_ugen2.2': '/dev/ugen2.2',
    '_dev_lpt0': '/dev/lpt0'
} %}
{% set device_path = comport_map[comport]|default('') %}

{# Map size option values to actual sizes #}
{% set size_map = {
    '_12x1': '12x1', '_12x2': '12x2', '_12x4': '12x4',
    '_16x1': '16x1', '_16x2': '16x2', '_16x4': '16x4',
    '_20x1': '20x1', '_20x2': '20x2', '_20x4': '20x4',
    '_40x2': '40x2'
} %}
{% set display_size = size_map[size]|default(size) %}

{# Map loglevel option values #}
{% set loglevel_map = {
    'm1': '0', '_0': '0', '_1': '1', '_2': '2', '_3': '3', '_4': '4', '_5': '5'
} %}
{% set log_level = loglevel_map[loglevel]|default('2') %}

{# Map refresh frequency #}
{% set refresh_map = {
    '_1': '1', '_2': '2', '_3': '3', '_5': '5', '_10': '10', '_15': '15'
} %}
{% set wait_time = refresh_map[refresh]|default(refresh) %}

{# Map port speed #}
{% set speed_map = {
    '_0': '0', '_1200': '1200', '_2400': '2400', '_9600': '9600',
    '_19200': '19200', '_57600': '57600', '_115200': '115200'
} %}
{% set baud_speed = speed_map[port_speed]|default('0') %}

{# Map brightness/contrast values (strip leading underscore, handle m1 as default) #}
{% set pct_map = {
    'm1': '-1', '_0': '0', '_10': '100', '_20': '200', '_30': '300',
    '_40': '400', '_50': '500', '_60': '600', '_70': '700',
    '_80': '800', '_90': '900', '_100': '1000'
} %}
{% set bright_val = pct_map[brightness]|default('-1') %}
{% set offbright_val = pct_map[offbrightness]|default('-1') %}
{% set contrast_val = pct_map[contrast]|default('-1') %}

{# Map connection type #}
{% set conntype_map = {
    '_4bit': '4bit', '_8bit': '8bit', 'winamp': 'winamp',
    'serialLpt': 'serialLpt', 'picanlcd': 'picanlcd',
    'lcdserializer': 'lcdserializer', 'los_panel': 'los-panel',
    'vdr_lcd': 'vdr-lcd', 'vdr_wakeup': 'vdr-wakeup',
    'pertelian': 'pertelian', 'bwctusb': 'bwctusb',
    'lcd2usb': 'lcd2usb', 'usbtiny': 'usbtiny',
    'lis2': 'lis2', 'mplay': 'mplay', 'ftdi': 'ftdi',
    'usblcd': 'usblcd', 'i2c': 'i2c', 'ezio': 'ezio'
} %}
{% set conn_type = conntype_map[connection_type]|default(connection_type) %}

[server]
DriverPath=/usr/local/lib/lcdproc/
Driver={{ driver }}
Bind=127.0.0.1
Port=13666
{% if loglevel != 'm1' %}
ReportLevel={{ log_level }}
{% endif %}
ReportToSyslog=yes
User=nobody
Foreground=no
{% if driver == 'sdeclcd' %}
ServerScreen=on
{% else %}
ServerScreen=no
{% endif %}
Hello="  Welcome to"
Hello="   OPNsense!"
GoodBye="Thanks for using"
GoodBye="   OPNsense!"
WaitTime={{ wait_time }}
{% if backlight != 'default' %}
Backlight={{ backlight }}
{% endif %}
{% if driver == 'sdeclcd' %}
PrevScreenKey=Down
NextScreenKey=Up
{% endif %}

{% if general.controlmenu|default('0') == '1' %}
[menu]
{% if driver == 'sdeclcd' %}
MenuKey=Left
EnterKey=Right
{% else %}
MenuKey=Escape
EnterKey=Enter
{% endif %}
UpKey=Up
DownKey=Down
{% endif %}

